<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .handwriting { font-family: 'Caveat', cursive; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a051a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f43f5e; }
        
        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);
        }
    </style>

    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0a051a] text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useMemo, memo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Firebase Imports from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global Firebase Setup - Added Safety Guards to prevent blank screen outside environment
        let firebaseApp, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-portfolio-app';
        
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : { apiKey: "", authDomain: "", projectId: "placeholder", storageBucket: "", messagingSenderId: "", appId: "" };
            
            if (firebaseConfig.projectId !== "placeholder") {
                firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
            }
        } catch (e) {
            console.error("Firebase Configuration missing or invalid. App running in offline mode.");
        }

        // Robust Icon Helper - Memoized to prevent unnecessary re-renders
        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    try {
                        const iconName = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
                        const i = document.createElement('i');
                        i.setAttribute('data-lucide', iconName);
                        if (className) i.className = className;
                        iconRef.current.appendChild(i);
                        window.lucide.createIcons({
                            attrs: {
                                'stroke-width': 2,
                                width: size,
                                height: size
                            }
                        });
                    } catch (err) {
                        console.warn("Icon failed to render:", name);
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center leading-none" />;
        });

        // --- SUB-COMPONENTS ---

        const PortfolioView = ({ portfolioData, isScrolled, isLoggedInLocal, setView, setShowLoginModal }) => (
            <div className="relative">
                <div className="fixed inset-0 pointer-events-none z-0">
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[150px] rounded-full" />
                    <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-rose-600/10 blur-[150px] rounded-full" />
                </div>

                <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-black/40 backdrop-blur-xl border-b border-white/10 py-4' : 'bg-transparent py-8'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center gap-3 group cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                            <div className="flex flex-col -space-y-1">
                                <span className="font-extrabold tracking-tighter text-xl uppercase leading-none group-hover:text-rose-500 transition-colors">
                                    {portfolioData.name || "Portfolio Name"}
                                </span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
                                <a href="#home" className="hover:text-amber-400 transition-colors">Intro</a>
                                <a href="#skills" className="hover:text-rose-400 transition-colors">Magic</a>
                                <a href="#experience" className="hover:text-indigo-400 transition-colors">Path</a>
                                <a href="#contact" className="hover:text-emerald-400 transition-colors">Contact</a>
                            </div>
                            <button onClick={() => isLoggedInLocal ? setView('admin') : setShowLoginModal(true)} className="p-3 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all group">
                                <Icon name="Settings" size={18} className="text-rose-400 group-hover:rotate-90 transition-transform" />
                            </button>
                        </div>
                    </div>
                </nav>

                <header id="home" className="relative h-screen flex items-center pt-20">
                    <div className="container mx-auto px-6">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                            <div className="flex items-center gap-4 mb-6">
                                <span className="handwriting text-3xl text-amber-400 font-bold italic">Halo dunia!</span>
                            </div>
                            <h1 className="text-6xl md:text-[80px] font-black leading-[0.9] tracking-tighter mb-8 uppercase">
                                BIKIN <span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-amber-400">KREASI</span> <br/>YANG OTENTIK.
                            </h1>
                            <p className="text-lg text-slate-300 max-w-xl mb-6 italic border-l-4 border-rose-500 pl-6 bg-rose-500/5 py-4 rounded-r-2xl font-medium leading-relaxed">
                                {portfolioData.about}
                            </p>
                            
                            <div className="grid md:grid-cols-2 gap-4 max-w-xl mb-12 p-6 glass rounded-3xl">
                                <div className="flex items-center gap-3 text-slate-400 text-sm font-semibold">
                                    <Icon name="Calendar" size={16} className="text-rose-400" />
                                    <span>Lahir: {portfolioData.dob}</span>
                                </div>
                                <div className="flex items-center gap-3 text-slate-400 text-sm font-semibold">
                                    <Icon name="MapPin" size={16} className="text-amber-400" />
                                    <span>Alamat: {portfolioData.address}</span>
                                </div>
                                <div className="flex items-center gap-3 text-slate-400 text-sm font-semibold md:col-span-2">
                                    <Icon name="Languages" size={16} className="text-indigo-400" />
                                    <span>Bahasa: {portfolioData.languages}</span>
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-4">
                                <a href="#contact" className="px-10 py-5 bg-gradient-to-r from-rose-500 to-orange-500 rounded-2xl font-black text-lg shadow-xl shadow-rose-500/30 flex items-center gap-3 hover:scale-105 active:scale-95 transition-all">
                                    Mulai Kolaborasi <Icon name="Sparkles" size={20} />
                                </a>
                            </div>
                        </motion.div>
                    </div>
                </header>

                <section id="skills" className="py-32">
                    <div className="container mx-auto px-6">
                        <h2 className="text-5xl font-black tracking-tighter mb-16 italic uppercase">Magic Stack <span className="text-rose-500">.</span></h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            {portfolioData.skills?.map((skill, idx) => (
                                <div key={skill.id} className="p-8 rounded-[40px] bg-white/5 border border-white/10 backdrop-blur-md hover:border-rose-500/30 transition-all group">
                                    <div className="flex justify-between items-end h-20 mb-6">
                                        <div className="h-full w-2 bg-white/10 relative rounded-full overflow-hidden">
                                            <div className={`absolute bottom-0 w-full bg-gradient-to-t ${skill.color}`} style={{ height: `${skill.level}%` }} />
                                        </div>
                                        <span className="text-4xl font-black text-white/10 group-hover:text-white/20 transition-colors">0{idx+1}</span>
                                    </div>
                                    <h3 className="text-xl font-bold uppercase italic">{skill.name}</h3>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>

                <section id="experience" className="py-32 bg-white/5">
                    <div className="container mx-auto px-6">
                        <div className="grid md:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-5xl font-black mb-16 italic uppercase tracking-tighter underline decoration-rose-500 underline-offset-8">Work Path</h2>
                                <div className="space-y-12">
                                    {portfolioData.experience?.map((exp) => (
                                        <div key={exp.id} className="relative pl-10 border-l-4 border-white/5">
                                            <div className="absolute -left-[14px] top-0 w-6 h-6 bg-rose-500 rounded-xl rotate-45" />
                                            <span className="text-xs font-black text-rose-500 uppercase tracking-widest mb-2 block">{exp.period}</span>
                                            <h3 className="text-3xl font-black uppercase italic tracking-tight">{exp.pos}</h3>
                                            <p className="text-amber-400 font-bold mb-4 handwriting text-2xl">{exp.comp}</p>
                                            <p className="text-slate-400 font-medium leading-relaxed">{exp.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <h2 className="text-5xl font-black mb-16 italic uppercase tracking-tighter underline decoration-indigo-500 underline-offset-8">Active In</h2>
                                <div className="space-y-12">
                                    {portfolioData.organizations?.map((org) => (
                                        <div key={org.id} className="relative pl-10 border-l-4 border-white/5">
                                            <div className="absolute -left-[14px] top-0 w-6 h-6 bg-indigo-500 rounded-xl rotate-45" />
                                            <span className="text-xs font-black text-indigo-500 uppercase tracking-widest mb-2 block">{org.period}</span>
                                            <h3 className="text-3xl font-black uppercase italic tracking-tight">{org.role}</h3>
                                            <p className="text-emerald-400 font-bold mb-4 handwriting text-2xl">{org.name}</p>
                                            <p className="text-slate-400 font-medium leading-relaxed">{org.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section className="py-32">
                    <div className="container mx-auto px-6">
                        <h2 className="text-5xl font-black mb-16 italic uppercase tracking-tighter text-center">Sertifikasi <span className="text-rose-500">&</span> Arsip</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {portfolioData.certificates?.map((cert) => (
                                <div key={cert.id} className="p-8 bg-slate-950/50 border border-white/10 rounded-[40px] hover:scale-105 transition-all">
                                    <Icon name="Award" className="text-amber-500 mb-6" size={40} />
                                    <h3 className="text-2xl font-black mb-2 uppercase italic">{cert.title}</h3>
                                    <p className="text-slate-400 font-bold text-sm uppercase mb-8">{cert.issuer}</p>
                                    {cert.url && (
                                        <a href={cert.url} target="_blank" rel="noreferrer" className="flex items-center gap-3 text-rose-400 font-black text-xs uppercase tracking-widest hover:text-white transition-colors">
                                            Buka PDF <Icon name="ExternalLink" size={16} />
                                        </a>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </section>

                <section id="contact" className="py-32 bg-gradient-to-b from-transparent to-rose-950/20">
                    <div className="container mx-auto px-6 text-center">
                        <h2 className="text-7xl md:text-[100px] font-black italic tracking-tighter uppercase mb-12">Let's <span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-amber-400">Talk</span></h2>
                        <div className="grid md:grid-cols-3 gap-10 max-w-5xl mx-auto">
                            {/* Instagram */}
                            <a href={portfolioData.contact?.instagram} target="_blank" rel="noreferrer" className="p-10 glass rounded-[50px] group hover:border-rose-500 transition-all block">
                                <div className="w-20 h-20 bg-rose-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                                    <Icon name="Instagram" className="text-rose-500" size={40} />
                                </div>
                                <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Instagram</p>
                                <p className="text-xl font-bold italic truncate">@{portfolioData.contact?.instagram?.split('/').filter(p => p).pop() || 'Username'}</p>
                            </a>
                            {/* WhatsApp */}
                            <a href={`https://wa.me/${portfolioData.contact?.whatsapp?.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="p-10 glass rounded-[50px] group hover:border-emerald-500 transition-all block">
                                <div className="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                                    <Icon name="MessageCircle" className="text-emerald-500" size={40} />
                                </div>
                                <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-2">WhatsApp</p>
                                <p className="text-xl font-bold italic">{portfolioData.contact?.whatsapp || 'Number'}</p>
                            </a>
                            {/* LinkedIn */}
                            <a href={portfolioData.contact?.linkedin} target="_blank" rel="noreferrer" className="p-10 glass rounded-[50px] group hover:border-indigo-500 transition-all block">
                                <div className="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                                    <Icon name="Linkedin" className="text-indigo-500" size={40} />
                                </div>
                                <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-2">LinkedIn</p>
                                <p className="text-xl font-bold italic truncate">Connect Profile</p>
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        );

        const AdminPanel = ({ portfolioData, setView, saveToCloud, saveStatus, setIsLoggedInLocal, updateData, updateContact, addItem, removeItem, uploading, handlePdfUpload }) => (
            <div className="min-h-screen bg-slate-50 text-slate-900 flex">
                <aside className="w-80 bg-slate-900 text-white h-screen sticky top-0 p-10 flex flex-col">
                    <div className="mb-12">
                        <h2 className="text-2xl font-black italic tracking-tighter uppercase">Admin Portal</h2>
                        <p className="handwriting text-xl text-amber-400 font-bold">Cloud Sync Active</p>
                    </div>
                    <nav className="flex-1 space-y-4">
                        <button className="w-full flex items-center gap-4 p-4 bg-white/10 rounded-2xl font-bold uppercase text-[10px] tracking-widest">
                            <Icon name="Layout" size={18} className="text-rose-400" /> Dashboard
                        </button>
                    </nav>
                    <div className="space-y-4">
                        <button onClick={saveToCloud} disabled={saveStatus === 'saving'} className="w-full p-5 bg-gradient-to-r from-rose-500 to-amber-500 text-white rounded-3xl font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                            {saveStatus === 'saving' ? 'Saving...' : 'Save Changes'} <Icon name="Save" size={20} />
                        </button>
                        <button onClick={() => setView('portfolio')} className="w-full p-5 bg-white/5 border border-white/10 rounded-3xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-3">
                            <Icon name="Eye" size={18} /> View Site
                        </button>
                        <button onClick={() => { setIsLoggedInLocal(false); setView('portfolio'); }} className="w-full p-5 text-rose-500 font-black flex items-center justify-center gap-3 uppercase text-[10px] tracking-widest">
                            <Icon name="LogOut" size={18} /> Logout
                        </button>
                    </div>
                </aside>

                <main className="flex-1 p-16 overflow-y-auto max-h-screen">
                    <div className="max-w-4xl mx-auto space-y-12 pb-20">
                        <h1 className="text-5xl font-black tracking-tight uppercase italic underline decoration-rose-500 underline-offset-8">Edit Content</h1>

                        {/* Identity Section */}
                        <section className="bg-white p-12 rounded-[50px] shadow-sm border border-slate-200">
                            <h2 className="text-xl font-black mb-8 flex items-center gap-3 uppercase text-rose-500">
                                <Icon name="User" /> Identity
                            </h2>
                            <div className="grid grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Full Name</label>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 focus:border-rose-500 font-bold outline-none" value={portfolioData.name || ""} onChange={e => updateData('name', e.target.value)} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Birth Date</label>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 focus:border-rose-500 font-bold outline-none" value={portfolioData.dob || ""} onChange={e => updateData('dob', e.target.value)} />
                                </div>
                                <div className="col-span-2 space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Current Address</label>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 focus:border-rose-500 font-bold outline-none" value={portfolioData.address || ""} onChange={e => updateData('address', e.target.value)} />
                                </div>
                                <div className="col-span-2 space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Languages Spoken</label>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 focus:border-rose-500 font-bold outline-none" value={portfolioData.languages || ""} onChange={e => updateData('languages', e.target.value)} />
                                </div>
                                <div className="col-span-2 space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">About Me / Bio</label>
                                    <textarea rows="3" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-50 focus:border-rose-500 outline-none" value={portfolioData.about || ""} onChange={e => updateData('about', e.target.value)} />
                                </div>
                            </div>
                        </section>

                        {/* Social Channels Section */}
                        <section className="bg-white p-12 rounded-[50px] shadow-sm border border-slate-200">
                            <h2 className="text-xl font-black mb-8 flex items-center gap-3 uppercase text-emerald-500">
                                <Icon name="Share2" /> Social Channels
                            </h2>
                            <div className="grid grid-cols-1 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">WhatsApp Number</label>
                                    <div className="flex gap-2">
                                        <div className="bg-slate-100 p-3 rounded-xl flex items-center"><Icon name="MessageCircle" size={18} /></div>
                                        <input className="flex-1 p-3 bg-slate-50 rounded-xl border-2 border-slate-50 focus:border-emerald-500 outline-none font-bold" value={portfolioData.contact?.whatsapp || ""} onChange={e => updateContact('whatsapp', e.target.value)} placeholder="Contoh: +628123456789" />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Instagram URL</label>
                                    <div className="flex gap-2">
                                        <div className="bg-slate-100 p-3 rounded-xl flex items-center"><Icon name="Instagram" size={18} /></div>
                                        <input className="flex-1 p-3 bg-slate-50 rounded-xl border-2 border-slate-50 focus:border-rose-500 outline-none font-bold" value={portfolioData.contact?.instagram || ""} onChange={e => updateContact('instagram', e.target.value)} placeholder="https://instagram.com/username" />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">LinkedIn URL</label>
                                    <div className="flex gap-2">
                                        <div className="bg-slate-100 p-3 rounded-xl flex items-center"><Icon name="Linkedin" size={18} /></div>
                                        <input className="flex-1 p-3 bg-slate-50 rounded-xl border-2 border-slate-50 focus:border-indigo-500 outline-none font-bold" value={portfolioData.contact?.linkedin || ""} onChange={e => updateContact('linkedin', e.target.value)} placeholder="https://linkedin.com/in/username" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Other Sections (Experience, Organizations, etc.) */}
                        <section className="bg-white p-12 rounded-[50px] shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-xl font-black uppercase text-rose-500 flex items-center gap-3">
                                    <Icon name="Briefcase" /> Work Experience
                                </h2>
                                <button onClick={() => addItem('experience', { pos: "New Position", comp: "New Company", period: "2024 - Present", desc: "Job description here" })} className="px-6 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Plus" size={14} /> Add New
                                </button>
                            </div>
                            <div className="space-y-8">
                                {(portfolioData.experience || []).map((exp, idx) => (
                                    <div key={exp.id} className="p-8 bg-slate-50 rounded-3xl border border-slate-100 relative group">
                                        <button onClick={() => removeItem('experience', exp.id)} className="absolute top-6 right-6 p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">
                                            <Icon name="Trash2" size={18} />
                                        </button>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Position</label>
                                                <input className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-rose-500 font-bold" value={exp.pos} onChange={e => {
                                                    const news = [...portfolioData.experience];
                                                    news[idx].pos = e.target.value;
                                                    updateData('experience', news);
                                                }} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Company</label>
                                                <input className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-rose-500 font-bold" value={exp.comp} onChange={e => {
                                                    const news = [...portfolioData.experience];
                                                    news[idx].comp = e.target.value;
                                                    updateData('experience', news);
                                                }} />
                                            </div>
                                            <div className="col-span-2 space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Period</label>
                                                <input className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-rose-500 font-bold" value={exp.period} onChange={e => {
                                                    const news = [...portfolioData.experience];
                                                    news[idx].period = e.target.value;
                                                    updateData('experience', news);
                                                }} />
                                            </div>
                                            <div className="col-span-2 space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Description</label>
                                                <textarea rows="2" className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-rose-500" value={exp.desc} onChange={e => {
                                                    const news = [...portfolioData.experience];
                                                    news[idx].desc = e.target.value;
                                                    updateData('experience', news);
                                                }} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>
                </main>
            </div>
        );

        // --- MAIN APP COMPONENT ---

        const App = () => {
            const [view, setView] = useState('portfolio');
            const [user, setUser] = useState(null);
            const [loginPassword, setLoginPassword] = useState('');
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [saveStatus, setSaveStatus] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isLoggedInLocal, setIsLoggedInLocal] = useState(false);
            const [uploading, setUploading] = useState(null);
            const [supabaseClient, setSupabaseClient] = useState(null);

            const [portfolioData, setPortfolioData] = useState({
                name: "Nama Anda",
                dob: "01 Januari 2000",
                address: "Jakarta, Indonesia",
                languages: "Bahasa Indonesia, English",
                role: "Full Stack Developer",
                about: "Saya percaya bahwa teknologi haruslah indah dan manusiawi. Saya menggabungkan logika kode dengan estetika visual.",
                contact: {
                    whatsapp: "+628123456789",
                    instagram: "https://instagram.com/",
                    linkedin: "https://linkedin.com/in/"
                },
                skills: [
                    { name: "React JS", level: 90, color: "from-blue-400 to-indigo-500", id: 1 },
                    { name: "UI Design", level: 85, color: "from-pink-400 to-rose-500", id: 2 }
                ],
                experience: [],
                organizations: [],
                certificates: []
            });

            useEffect(() => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                script.async = true;
                script.onload = () => {
                    const supabaseUrl = 'https://pxneghnsllquafsmlrfh.supabase.co';
                    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4bmVnaG5zbGxxdWFmc21scmZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTU3NjEsImV4cCI6MjA4OTI5MTc2MX0.VLfu04NPZ9b5yCVOdOW1fz3X0HWqnTCc4TM4yYeO9Nk';
                    if (window.supabase) {
                        setSupabaseClient(window.supabase.createClient(supabaseUrl, supabaseAnonKey));
                    }
                };
                document.head.appendChild(script);
            }, []);

            useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth init error", e);
                    }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user || !db) {
                    if (!db) setLoading(false);
                    return;
                }
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'portfolio', 'content');
                const unsubscribeData = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setPortfolioData(prev => ({ ...prev, ...docSnap.data() }));
                    }
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore error", err);
                    setLoading(false);
                });

                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => {
                    unsubscribeData();
                    window.removeEventListener('scroll', handleScroll);
                };
            }, [user]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginPassword === "admin123") {
                    setIsLoggedInLocal(true);
                    setShowLoginModal(false);
                    setView('admin');
                } else {
                    alert("Password salah! (Hint: admin123)");
                }
            };

            const updateData = (key, value) => setPortfolioData(prev => ({ ...prev, [key]: value }));
            const updateContact = (key, value) => setPortfolioData(prev => ({ ...prev, contact: { ...prev.contact, [key]: value } }));

            const addItem = (section, newItem) => {
                setPortfolioData(prev => ({
                    ...prev,
                    [section]: [...(prev[section] || []), { ...newItem, id: Date.now() }]
                }));
            };

            const removeItem = (section, id) => {
                setPortfolioData(prev => ({
                    ...prev,
                    [section]: (prev[section] || []).filter(item => item.id !== id)
                }));
            };

            const saveToCloud = async () => {
                if (!user || !db) {
                    alert("Penyimpanan cloud tidak tersedia tanpa konfigurasi Firebase.");
                    return;
                }
                setSaveStatus('saving');
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'portfolio', 'content');
                    await setDoc(docRef, portfolioData);
                    setSaveStatus('success');
                    setTimeout(() => setSaveStatus(null), 2000);
                } catch (error) {
                    console.error("Save failed", error);
                    setSaveStatus('error');
                }
            };

            const handlePdfUpload = async (e, certId) => {
                if (!supabaseClient) return;
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') {
                    alert("Harap pilih file PDF.");
                    return;
                }
                setUploading(certId);
                try {
                    const fileName = `${Date.now()}-${certId}.pdf`;
                    const { data, error } = await supabaseClient.storage.from('certificates').upload(`pdfs/${fileName}`, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = supabaseClient.storage.from('certificates').getPublicUrl(`pdfs/${fileName}`);
                    const newCerts = portfolioData.certificates.map(c => c.id === certId ? { ...c, url: publicUrl } : c);
                    updateData('certificates', newCerts);
                } catch (error) {
                    console.error("Upload failed", error);
                } finally { setUploading(null); }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#0a051a] flex items-center justify-center">
                    <Icon name="Loader2" className="animate-spin text-rose-500" size={48} />
                </div>
            );

            return (
                <div className="min-h-screen overflow-x-hidden">
                    {view === 'portfolio' ? (
                        <PortfolioView 
                            portfolioData={portfolioData} 
                            isScrolled={isScrolled} 
                            isLoggedInLocal={isLoggedInLocal} 
                            setView={setView} 
                            setShowLoginModal={setShowLoginModal} 
                        />
                    ) : (
                        <AdminPanel 
                            portfolioData={portfolioData}
                            setView={setView}
                            saveToCloud={saveToCloud}
                            saveStatus={saveStatus}
                            setIsLoggedInLocal={setIsLoggedInLocal}
                            updateData={updateData}
                            updateContact={updateContact}
                            addItem={addItem}
                            removeItem={removeItem}
                            uploading={uploading}
                            handlePdfUpload={handlePdfUpload}
                        />
                    )}

                    <AnimatePresence>
                        {showLoginModal && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center bg-[#0a051a]/95 backdrop-blur-xl p-6">
                                <motion.div initial={{ scale: 0.9 }} animate={{ scale: 1 }} className="bg-white p-12 rounded-[50px] w-full max-w-md shadow-2xl">
                                    <div className="mb-10 text-center text-slate-900">
                                        <div className="w-20 h-20 bg-rose-100 text-rose-500 rounded-[30px] flex items-center justify-center mx-auto mb-6 rotate-12"><Icon name="Settings" size={40} /></div>
                                        <h2 className="text-4xl font-black italic uppercase">Admin Portal</h2>
                                    </div>
                                    <form onSubmit={handleLogin} className="space-y-6 text-slate-900">
                                        <input type="password" placeholder="Password rahasia..." className="w-full p-5 bg-slate-100 border-2 border-slate-100 rounded-[25px] focus:border-rose-500 outline-none text-center font-bold text-lg" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} autoFocus />
                                        <button className="w-full py-5 bg-gradient-to-r from-rose-500 to-amber-500 text-white font-black rounded-[25px] shadow-xl shadow-rose-500/20 uppercase italic tracking-widest">Masuk</button>
                                        <button type="button" onClick={() => setShowLoginModal(false)} className="w-full text-xs font-black uppercase text-slate-400 hover:text-rose-500 transition-colors">Batal</button>
                                    </form>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
