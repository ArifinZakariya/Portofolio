                        i.setAttribute('data-lucide', iconName);

                            attrs: { 'stroke-width': 2, width: size, height: size }

                                    <textarea rows="4" className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl focus:border-rose-500 outline-none font-medium transition-all" value={portfolioData.about || ""} onChange={e => updateData('about', e.target.value)} />

                        </section>

                        <section className="admin-card p-10 rounded-[40px]">
                            <h2 className="text-lg font-black mb-8 flex items-center gap-3 uppercase text-emerald-600">
                                <Icon name="Share2" size={20} /> Media Sosial & Kontak
                            </h2>
                            <div className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">WhatsApp Number</label>
                                    <div className="relative group">
                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="MessageCircle" size={18} /></div>
                                        <input className="w-full p-4 pl-14 bg-slate-50 border border-slate-200 rounded-2xl focus:border-emerald-500 outline-none font-bold" value={portfolioData.contact?.whatsapp || ""} onChange={e => updateContact('whatsapp', e.target.value)} placeholder="+628..." />
                                    </div>
                                </div>

                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Instagram URL</label>
                                    <div className="relative group">
                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="Instagram" size={18} /></div>
                                        <input className="w-full p-4 pl-14 bg-slate-50 border border-slate-200 rounded-2xl focus:border-rose-500 outline-none font-bold" value={portfolioData.contact?.instagram || ""} onChange={e => updateContact('instagram', e.target.value)} placeholder="https://instagram.com/..." />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">LinkedIn URL</label>
                                    <div className="relative group">
                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="Linkedin" size={18} /></div>
                                        <input className="w-full p-4 pl-14 bg-slate-50 border border-slate-200 rounded-2xl focus:border-indigo-500 outline-none font-bold" value={portfolioData.contact?.linkedin || ""} onChange={e => updateContact('linkedin', e.target.value)} placeholder="https://linkedin.com/in/..." />

                        </section>

                        <section className="admin-card p-10 rounded-[40px]">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-lg font-black uppercase text-rose-500 flex items-center gap-3"><Icon name="Briefcase" size={20} /> Pengalaman Kerja</h2>
                                <button onClick={() => addItem('experience', { pos: "New Position", comp: "New Company", period: "2024", desc: "Description" })} className="px-6 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center gap-2 hover:bg-rose-500 transition-all">
                                    <Icon name="Plus" size={14} /> Tambah
                                </button>
                            </div>
                            <div className="space-y-6">
                                {(portfolioData.experience || []).map((exp, idx) => (
                                    <div key={exp.id} className="p-8 bg-slate-50 rounded-3xl border border-slate-200 relative">
                                        <button onClick={() => removeItem('experience', exp.id)} className="absolute top-6 right-6 p-2 text-rose-500 hover:bg-rose-100 rounded-xl transition-all"><Icon name="Trash2" size={18} /></button>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Perusahaan</label>
                                                <input className="w-full p-3 rounded-xl border bg-white font-bold" value={exp.comp} onChange={e => {
                                                    const news = [...portfolioData.experience]; news[idx].comp = e.target.value; updateData('experience', news);

                                            </div>
                                            <div className="col-span-full space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Periode</label>
                                                <input className="w-full p-3 rounded-xl border bg-white" value={exp.period} onChange={e => {
                                                    const news = [...portfolioData.experience]; news[idx].period = e.target.value; updateData('experience', news);
                                                }} />
                                            </div>
                                            <div className="col-span-full space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Deskripsi Tugas</label>
                                                <textarea className="w-full p-3 rounded-xl border bg-white" rows="2" value={exp.desc} onChange={e => {
                                                    const news = [...portfolioData.experience]; news[idx].desc = e.target.value; updateData('experience', news);
                                                }} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="admin-card p-10 rounded-[40px]">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-lg font-black uppercase text-indigo-600 flex items-center gap-3"><Icon name="Users" size={20} /> Pengalaman Organisasi</h2>
                                <button onClick={() => addItem('organizations', { role: "Member", name: "Org Name", period: "2024", desc: "Short description" })} className="px-6 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center gap-2 hover:bg-indigo-500 transition-all">
                                    <Icon name="Plus" size={14} /> Tambah
                                </button>
                            </div>
                            <div className="space-y-6">
                                {(portfolioData.organizations || []).map((org, idx) => (
                                    <div key={org.id} className="p-8 bg-slate-50 rounded-3xl border border-slate-200 relative">
                                        <button onClick={() => removeItem('organizations', org.id)} className="absolute top-6 right-6 p-2 text-rose-500 hover:bg-rose-100 rounded-xl transition-all"><Icon name="Trash2" size={18} /></button>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Jabatan</label>
                                                <input className="w-full p-3 rounded-xl border bg-white font-bold" value={org.role} onChange={e => {
                                                    const news = [...portfolioData.organizations]; news[idx].role = e.target.value; updateData('organizations', news);
                                                }} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Organisasi</label>
                                                <input className="w-full p-3 rounded-xl border bg-white font-bold" value={org.name} onChange={e => {
                                                    const news = [...portfolioData.organizations]; news[idx].name = e.target.value; updateData('organizations', news);
                                                }} />
                                            </div>
                                            <div className="col-span-full space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Periode</label>
                                                <input className="w-full p-3 rounded-xl border bg-white" value={org.period} onChange={e => {
                                                    const news = [...portfolioData.organizations]; news[idx].period = e.target.value; updateData('organizations', news);
                                                }} />
                                            </div>
                                            <div className="col-span-full space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Deskripsi Singkat</label>
                                                <textarea className="w-full p-3 rounded-xl border bg-white" rows="2" value={org.desc} onChange={e => {
                                                    const news = [...portfolioData.organizations]; news[idx].desc = e.target.value; updateData('organizations', news);
                                                }} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="admin-card p-10 rounded-[40px]">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-lg font-black uppercase text-rose-500 flex items-center gap-3"><Icon name="Zap" size={20} /> Skill & Keahlian</h2>
                                <button onClick={() => addItem('skills', { name: "New Skill", level: 80, color: "from-rose-500 to-orange-500" })} className="px-6 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center gap-2 hover:bg-rose-500 transition-all">
                                    <Icon name="Plus" size={14} /> Tambah
                                </button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {(portfolioData.skills || []).map((skill, idx) => (
                                    <div key={skill.id} className="flex gap-3 items-center p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                        <div className="flex-1 space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Nama Skill</label>
                                            <input className="w-full p-3 rounded-xl border bg-white outline-none focus:border-rose-500 font-bold" value={skill.name} onChange={e => {
                                                const news = [...portfolioData.skills]; news[idx].name = e.target.value; updateData('skills', news);
                                            }} />
                                        </div>
                                        <div className="w-24 space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center block">%</label>
                                            <input type="number" className="w-full p-3 rounded-xl border bg-white text-center font-bold" value={skill.level} onChange={e => {
                                                const news = [...portfolioData.skills]; news[idx].level = parseInt(e.target.value) || 0; updateData('skills', news);
                                            }} />
                                        </div>
                                        <button onClick={() => removeItem('skills', skill.id)} className="p-3 text-rose-500 hover:bg-rose-100 rounded-xl transition-all mt-4"><Icon name="Trash2" size={18} /></button>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="admin-card p-10 rounded-[40px]">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-lg font-black uppercase text-amber-600 flex items-center gap-3"><Icon name="Award" size={20} /> Sertifikat & Penghargaan</h2>
                                <button onClick={() => addItem('certificates', { title: "Title", issuer: "Issuer", url: null })} className="px-6 py-3 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center gap-2 hover:bg-amber-500 transition-all">
                                    <Icon name="Plus" size={14} /> Tambah
                                </button>
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                {(portfolioData.certificates || []).map((cert, idx) => (
                                    <div key={cert.id} className="p-8 bg-slate-50 rounded-3xl border border-slate-200 relative">
                                        <button onClick={() => removeItem('certificates', cert.id)} className="absolute top-6 right-6 p-2 text-rose-500 hover:bg-rose-100 rounded-xl transition-all"><Icon name="Trash2" size={18} /></button>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Nama Sertifikat</label>
                                                <input className="w-full p-3 rounded-xl border bg-white font-bold" value={cert.title} onChange={e => {
                                                    const news = [...portfolioData.certificates]; news[idx].title = e.target.value; updateData('certificates', news);
                                                }} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Penerbit</label>
                                                <input className="w-full p-3 rounded-xl border bg-white font-bold" value={cert.issuer} onChange={e => {
                                                    const news = [...portfolioData.certificates]; news[idx].issuer = e.target.value; updateData('certificates', news);
                                                }} />
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <label className={`flex-1 flex items-center justify-center gap-3 p-6 bg-white border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-amber-500 transition-all font-black text-xs uppercase tracking-widest ${uploading === cert.id ? 'opacity-50 pointer-events-none' : ''}`}>
                                                {uploading === cert.id ? <Icon name="Loader2" className="animate-spin text-amber-500" size={20} /> : <Icon name="UploadCloud" className="text-slate-400" size={20} />}
                                                {cert.url ? "Ganti File PDF" : "Upload Dokumen (PDF)"}
                                                <input type="file" accept=".pdf" className="hidden" onChange={e => handlePdfUpload(e, cert.id)} />
                                            </label>
                                            {cert.url && <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100 flex items-center gap-2 font-bold text-xs"><Icon name="CheckCircle" size={16} /> File Siap</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>
                </main>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('portfolio');
            const [loginPassword, setLoginPassword] = useState('');
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [saveStatus, setSaveStatus] = useState(null);
            const [loading, setLoading] = useState(true);
            const [dbError, setDbError] = useState(null);
            const [isLoggedInLocal, setIsLoggedInLocal] = useState(false);
            const [uploading, setUploading] = useState(null);

            const [portfolioData, setPortfolioData] = useState({
                name: "Nama Anda",
                dob: "01 Jan 2000",
                address: "Kota, Negara",
                languages: "Indonesia, English",
                about: "Halo! Edit bio ini di panel admin.",
                contact: { whatsapp: "", instagram: "", linkedin: "" },
                skills: [],
                experience: [],
                organizations: [],
                certificates: []
            });

            useEffect(() => {
                const fetchPortfolio = async () => {
                    try {
                        const { data, error } = await supabase
                            .from('portfolio_content')
                            .select('content')
                            .eq('app_id', appId)
                            .maybeSingle();

                        if (error) {
                            if (error.code === 'PGRST205' || error.message?.includes('schema cache')) {
                                setDbError('TABLE_MISSING');
                            } else {
                                console.error("Error fetching data:", error);
                            }
                        } else if (data && data.content) {
                            setPortfolioData(data.content);
                        }
                    } catch (err) {
                        console.error("Critical error fetching data:", err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchPortfolio();

                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const updateData = (key, value) => setPortfolioData(prev => ({ ...prev, [key]: value }));
            const updateContact = (key, value) => setPortfolioData(prev => ({ ...prev, contact: { ...prev.contact, [key]: value } }));
            const addItem = (section, newItem) => setPortfolioData(prev => ({ ...prev, [section]: [...(prev[section] || []), { ...newItem, id: Date.now() }] }));
            const removeItem = (section, id) => setPortfolioData(prev => ({ ...prev, [section]: (prev[section] || []).filter(item => item.id !== id) }));

            const saveToCloud = async () => {
                setSaveStatus('saving');
                try {
                    const { error } = await supabase
                        .from('portfolio_content')
                        .upsert({ app_id: appId, content: portfolioData }, { onConflict: 'app_id' });

                    if (error) {
                        if (error.code === 'PGRST205') {
                            setDbError('TABLE_MISSING');
                            throw new Error("Table missing");
                        }
                        throw error;
                    }
                    
                    setSaveStatus('success');
                    setTimeout(() => setSaveStatus(null), 2000);
                } catch (error) {
                    console.error("Save error:", error);
                    setSaveStatus('error');
                    setTimeout(() => setSaveStatus(null), 3000);
                }
            };

            const handlePdfUpload = async (e, certId) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') {
                    alert("Harap pilih file PDF.");
                    return;
                }
                
                setUploading(certId);
                try {
                    const fileExt = 'pdf';
                    const fileName = `${appId}/${certId}-${Date.now()}.${fileExt}`;
                    
                    const { data, error } = await supabase.storage
                        .from('certificates')
                        .upload(fileName, file, { cacheControl: '3600', upsert: true });

                    if (error) throw error;

                    const { data: { publicUrl } } = supabase.storage
                        .from('certificates')
                        .getPublicUrl(fileName);

                    const newCerts = portfolioData.certificates.map(c => 
                        c.id === certId ? { ...c, url: publicUrl } : c
                    );
                    updateData('certificates', newCerts);
                } catch (error) {
                    console.error("Upload failed:", error);
                    alert("Gagal mengupload file. Pastikan bucket 'certificates' sudah dibuat di Supabase Storage.");
                } finally {
                    setUploading(null);
                }
            };

            if (dbError === 'TABLE_MISSING') return <SetupGuide />;

            if (loading) return (
                <div className="min-h-screen bg-[#0a051a] flex items-center justify-center">
                    <motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 1, ease: "linear" }}>
                        <Icon name="Loader2" className="text-rose-500" size={64} />
                    </motion.div>
                </div>
            );

            return (
                <div className="min-h-screen-ios overflow-x-hidden selection:bg-rose-500/30 selection:text-white">
                    {view === 'portfolio' ? (
                        <PortfolioView portfolioData={portfolioData} isScrolled={isScrolled} isLoggedInLocal={isLoggedInLocal} setView={setView} setShowLoginModal={setShowLoginModal} />
                    ) : (
                        <AdminPanel portfolioData={portfolioData} setView={setView} saveToCloud={saveToCloud} saveStatus={saveStatus} setIsLoggedInLocal={setIsLoggedInLocal} updateData={updateData} updateContact={updateContact} addItem={addItem} removeItem={removeItem} uploading={uploading} handlePdfUpload={handlePdfUpload} />
                    )}

                    <AnimatePresence>
                        {showLoginModal && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl p-6">
                                <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} className="bg-white p-10 md:p-14 rounded-[60px] w-full max-w-md shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-rose-500 to-amber-500" />
                                    <div className="mb-10 text-center text-slate-900">
                                        <div className="w-20 h-20 bg-rose-100 text-rose-500 rounded-[35px] flex items-center justify-center mx-auto mb-8 rotate-6"><Icon name="Lock" size={40} /></div>
                                        <h2 className="text-4xl font-black italic uppercase tracking-tighter">Admin Access</h2>
                                        <p className="text-slate-400 font-bold text-sm mt-2 uppercase tracking-widest">Authorized personnel only</p>
                                    </div>
                                    <form onSubmit={(e) => { e.preventDefault(); if(loginPassword === "admin123"){ setIsLoggedInLocal(true); setShowLoginModal(false); setView('admin'); } else alert("Password Salah!"); }} className="space-y-6">
                                        <input type="password" placeholder="••••••••" className="w-full p-6 bg-slate-100 border-2 border-slate-100 focus:border-rose-500 focus:bg-white outline-none rounded-[30px] text-center font-black text-2xl tracking-widest text-slate-900 transition-all" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} autoFocus />
                                        <button className="w-full py-6 bg-gradient-to-r from-rose-500 to-orange-500 text-white font-black rounded-[30px] shadow-2xl shadow-rose-500/30 uppercase tracking-[0.1em] hover:scale-105 active:scale-95 transition-all">Unlock Portal</button>
                                        <button type="button" onClick={() => setShowLoginModal(false)} className="w-full text-xs font-black uppercase text-slate-400 hover:text-rose-500 transition-colors">Go Back</button>
                                    </form>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
